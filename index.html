<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <!-- 强制锁定亮色模式，防御系统级深色/夜间模式干扰 -->
    <meta name="color-scheme" content="light">
    <title>国家职业资格证书管理系统</title>
    <style>
        /* ================= 全端重置与底层硬件加速 ================= */
        :root {
            /* 锁定顶部物理高度，防御输入法弹起引起的视口坍塌 */
            --header-h: 64px; 
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
            -webkit-tap-highlight-color: transparent;
            /* 物理级绝杀手势缩放 */
            touch-action: manipulation; 
            -webkit-text-size-adjust: 100% !important;
            text-size-adjust: 100% !important;
        }

        html, body {
            width: 100%;
            height: 100dvh; 
            overflow: hidden; 
            background-color: #ffffff; 
            font-family: -apple-system, system-ui, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
            /* 移除了背景过渡，实现瞬发变色 */
        }

        /* 隐藏全局与局部滚动条，防止 PC 端挤压 25% 比例 */
        ::-webkit-scrollbar { display: none !important; width: 0 !important; height: 0 !important; }

        .page {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: none;
            z-index: 10;
            background-color: inherit;
        }

        /* 移除 Fade-in，实现页面瞬发展示 */
        .page.active { display: block; }

        /* ================= 顶部导航栏 (兼容 Cloudflare Banner) ================= */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: var(--header-h);
            background-color: #f5f5f5;
            display: flex;
            align-items: center;
            justify-content: space-between;
            /* 融合刘海屏与托管平台注入条的安全区 */
            padding-top: env(safe-area-inset-top);
            padding-left: calc(16px + env(safe-area-inset-left));
            padding-right: calc(16px + env(safe-area-inset-right));
            z-index: 999;
        }

        .header-icon-close { 
            font-family: Arial, sans-serif;
            font-size: 26px; 
            color: #555; 
            cursor: pointer;
            padding: 10px;
        }
        
        .header-icon-more { 
            font-family: serif; 
            font-size: 19px; 
            color: #555; 
            font-weight: bold; 
            letter-spacing: 2px;
            padding: 10px;
        }

        .header-center {
            position: absolute;
            left: 50%;
            top: calc(50% + (env(safe-area-inset-top) / 2));
            transform: translate(-50%, -50%);
            text-align: center;
            width: 65%;
            pointer-events: none;
        }

        /* 标题：字重调浅，颜色调柔和 */
        .header-title {
            font-size: 18px;
            font-weight: 500; 
            color: #333; 
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .header-domain {
            font-size: 11px;
            color: #999;
            margin-top: 1px;
        }

        /* ================= 内容布局基础 ================= */
        .content-body {
            position: absolute;
            top: var(--header-h);
            left: 0;
            right: 0;
            bottom: 0;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        /* 验证页主体 */
        .verify-page {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 48px;
            background-color: #ffffff;
        }

        .h1-title {
            font-size: 22px;
            color: #333;
            margin-bottom: 48px;
        }

        .captcha-area {
            width: 248px;
            height: 40px;
            display: flex;
            justify-content: space-between;
            gap: 4px;
            margin-bottom: 48px;
        }

        /* 密码管理器防污染与输入框定制 */
        .input-box {
            width: 150px;
            height: 100%;
            border: 2px solid #d4af37 !important;
            border-radius: 6px;
            padding: 0 10px;
            font-size: 16px; /* 16px 绝杀 iOS 自动拉近 */
            outline: none !important;
            box-shadow: none !important;
            caret-color: #d4af37;
            -webkit-appearance: none;
            background-color: #ffffff;
            -webkit-user-select: text;
            user-select: text;
        }
        .input-box:-webkit-autofill {
            -webkit-box-shadow: 0 0 0px 1000px white inset !important;
            -webkit-text-fill-color: #333 !important;
        }

        /* 像素级复刻验证码 */
        .captcha-img-box {
            width: 94px;
            height: 100%;
            border: 1px solid #0000cd;
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: "Comic Sans MS", "Chalkboard SE", "Bradley Hand", cursive;
            color: #0000cd;
        }
        .hand-char { display: inline-block; }
        .c1 { transform: rotate(-15deg) translateY(2px); font-size: 20px; font-weight: bold; }
        .c2 { transform: rotate(10deg) translateY(-1px); font-size: 17px; }
        .c3 { transform: rotate(-8deg) translateY(3px); font-size: 22px; font-weight: bold; }
        .c4 { transform: rotate(18deg) translateY(-2px); font-size: 19px; }

        .btn-confirm {
            width: 248px;
            height: 40px;
            background-color: #557bf8;
            border: none;
            border-radius: 20px;
            color: #fff;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
        }
        .btn-confirm:active { background-color: #4a6ee0; }

        /* ================= 证书展示页 (全端制霸) ================= */
        .cert-page {
            background-color: #e0edf8;
            /* 绝杀 iOS 与安卓的长按选中和缩放 */
            touch-action: none; 
            overscroll-behavior-y: contain; 
        }

        .img-container {
            width: 45%;
            margin: 3px auto 0; /* 极致 3px 缝隙 */
            background-color: #ffffff;
            border: 1px solid #dcdcdc;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            overflow: hidden;
            pointer-events: none; /* 绝杀点击放大和双击事件 */
            min-height: calc(40dvh - 3px);
        }

        /* PC端严格媒体查询：宽度 25%，长度占比 66.6% (2/3) */
        @media screen and (min-width: 768px) {
            .img-container {
                width: 25%;
                min-height: calc(66.6dvh - 3px);
            }
        }

        #cert-img {
            width: 100%;
            height: auto;
            display: block;
            opacity: 0;
            /* 彻底移除 transition，实现瞬间闪现 */
        }

        #msg-box {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.85);
            color: #fff;
            padding: 14px 24px;
            border-radius: 8px;
            display: none;
            z-index: 10001;
            font-size: 16px;
            white-space: nowrap;
        }
    </style>
</head>
<body>

    <div id="msg-box"></div>

    <!-- Page 1: 验证页 -->
    <div id="page-verify" class="page active">
        <div class="header">
            <span class="header-icon-close" onclick="location.reload()">&times;</span>
            <div class="header-center">
                <div class="header-title">国家职业资格证书管理系统</div>
                <div class="header-domain">zxnl.ceht.net</div>
            </div>
            <span class="header-icon-more">···</span>
        </div>
        <div class="content-body verify-page">
            <div class="h1-title">请输入验证码</div>
            <div class="captcha-area">
                <input type="text" id="captcha-input" class="input-box" placeholder="验证码" maxlength="4" autocomplete="off" spellcheck="false" inputmode="text">
                <div class="captcha-img-box">
                    <span class="hand-char c1">e</span>
                    <span class="hand-char c2">e</span>
                    <span class="hand-char c3">q</span>
                    <span class="hand-char c4">c</span>
                </div>
            </div>
            <button id="btn-submit" class="btn-confirm">确认</button>
        </div>
    </div>

    <!-- Page 2: 证书页 -->
    <div id="page-result" class="page">
        <div class="header">
            <span class="header-icon-close" id="btn-back">&times;</span>
            <div class="header-center">
                <div class="header-title">证书信息</div>
                <div class="header-domain">xf.kaoxue.com</div>
            </div>
            <span class="header-icon-more">···</span>
        </div>
        <div class="content-body cert-page">
            <div class="img-container" id="cert-container"></div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const btnSubmit = document.getElementById('btn-submit');
            const input = document.getElementById('captcha-input');
            const pageVerify = document.getElementById('page-verify');
            const pageResult = document.getElementById('page-result');
            const btnBack = document.getElementById('btn-back');
            const certContainer = document.getElementById('cert-container');
            const msgBox = document.getElementById('msg-box');
            
            let timer = null;

            function showMsg(txt) {
                msgBox.innerText = txt;
                msgBox.style.display = 'block';
                if(timer) clearTimeout(timer);
                timer = setTimeout(() => { msgBox.style.display = 'none'; }, 2000);
            }

            function processVerification() {
                const val = input.value.trim().toLowerCase();
                if (val === 'eeqc') {
                    // 1. 瞬间变色
                    document.body.style.backgroundColor = '#e0edf8';
                    document.documentElement.style.backgroundColor = '#e0edf8';
                    
                    // 2. 瞬间切换页面
                    pageVerify.classList.remove('active');
                    pageResult.classList.add('active');
                    
                    // 3. 构建无缝渲染图片
                    certContainer.innerHTML = ''; 
                    const newImg = document.createElement('img');
                    newImg.id = 'cert-img';
                    newImg.style.width = '100%';
                    newImg.style.height = 'auto';
                    newImg.style.display = 'block';
                    newImg.style.opacity = '0'; // 预设隐藏
                    
                    newImg.onload = function() { 
                        this.style.opacity = '1'; // 瞬间可见
                    };
                    
                    // GitHub/Cloudflare 大小写敏感适配序列
                    const cacheBuster = new Date().getTime(); // 防止部署后缓存报错
                    const imagesToTry = ['certificate.jpg', 'cert_image.jpg', 'certificate.png', 'cert_image.png'];
                    let currentIdx = 0;

                    newImg.onerror = function() {
                        currentIdx++;
                        if (currentIdx < imagesToTry.length) {
                            // 逐个降级尝试加载
                            this.src = imagesToTry[currentIdx] + '?t=' + cacheBuster;
                        } else {
                            this.onerror = null;
                        }
                    };

                    certContainer.appendChild(newImg);
                    // 优先加载您的 certificate.jpg
                    newImg.src = imagesToTry[0] + '?t=' + cacheBuster;
                    
                    // 收起键盘
                    input.blur();
                } else {
                    showMsg('验证码输入错误');
                }
            }

            btnSubmit.onclick = processVerification;
            
            // 响应键盘 Enter 键
            input.onkeydown = (e) => { 
                if (e.key === 'Enter' || e.keyCode === 13) {
                    e.preventDefault();
                    processVerification();
                }
            };

            btnBack.onclick = () => {
                // 瞬间恢复纯白
                document.body.style.backgroundColor = '#ffffff';
                document.documentElement.style.backgroundColor = '#ffffff';
                pageResult.classList.remove('active');
                pageVerify.classList.add('active');
                input.value = '';
                certContainer.innerHTML = ''; 
            };

            // 彻底解决 iOS 键盘回退白边
            input.onblur = () => {
                setTimeout(() => { 
                    window.scrollTo(0, 0); 
                    document.body.scrollTop = 0;
                    document.documentElement.scrollTop = 0;
                }, 100);
            };

            // 拦截折叠屏旋转变形
            window.addEventListener('resize', () => {
                if(document.activeElement.tagName !== 'INPUT') {
                    window.scrollTo(0, 0);
                }
            });
        });
    </script>
</body>
</html>

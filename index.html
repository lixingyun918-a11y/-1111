<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="color-scheme" content="light">
    <!-- 零宽字符：强行置空微信/QQ/系统浏览器的自带标题栏，确保只显示我们的唯一标题 -->
    <title>&#8203;</title>
    <style>
        /* ================= 核心重置与物理常量定义 ================= */
        :root {
            --safe-top: env(safe-area-inset-top, 0px);
            --header-base: 60px;
            --header-total: calc(var(--header-base) + var(--safe-top));
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
            -webkit-tap-highlight-color: transparent;
            -webkit-text-size-adjust: 100% !important;
        }

        html, body {
            width: 100%;
            height: 100dvh; 
            overflow: hidden; 
            background-color: #ffffff; 
            font-family: -apple-system, system-ui, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
            overscroll-behavior: none; 
            touch-action: manipulation; 
        }

        ::-webkit-scrollbar { display: none !important; width: 0 !important; height: 0 !important; }

        .page {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            display: none;
            z-index: 10;
            background-color: inherit;
        }

        .page.active { display: block; }

        /* ================= 唯一专属顶部导航栏 ================= */
        .custom-header {
            position: absolute;
            top: 0; left: 0; right: 0;
            height: var(--header-total);
            background-color: #f5f5f5;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-top: var(--safe-top);
            padding-left: calc(16px + env(safe-area-inset-left, 0px));
            padding-right: calc(16px + env(safe-area-inset-right, 0px));
            z-index: 999;
            border-bottom: 1px solid #eaeaea; 
        }

        .header-icon-close { 
            font-family: Arial, sans-serif;
            font-size: 28px; 
            color: #333; 
            cursor: pointer;
            padding: 10px;
            margin: -10px;
            font-weight: 300;
        }
        
        .header-icon-more { 
            font-family: serif; 
            font-size: 20px; 
            color: #333; 
            font-weight: bold; 
            letter-spacing: 2px;
            padding: 10px;
            margin: -10px;
            transform: translateY(-2px);
        }

        .header-center {
            position: absolute;
            left: 50%;
            top: calc(50% + (var(--safe-top) / 2));
            transform: translate(-50%, -50%);
            text-align: center;
            width: 65%;
            pointer-events: none;
        }

        .header-title {
            font-size: 18px;
            font-weight: 500; 
            color: #111; 
            line-height: 1.2;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .header-domain {
            font-size: 11px;
            color: #999;
            margin-top: 1px;
            white-space: nowrap;
        }

        /* ================= 验证码页内容区 ================= */
        .verify-wrap {
            position: absolute;
            top: var(--header-total);
            bottom: 0; left: 0; right: 0;
            background-color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 48px;
            overflow-y: auto;
        }

        .h1-title {
            font-size: 22px;
            color: #333;
            margin-bottom: 48px;
        }

        .captcha-area {
            width: 248px;
            height: 40px;
            display: flex;
            justify-content: space-between;
            gap: 4px;
            margin-bottom: 48px;
        }

        .input-box {
            width: 150px;
            height: 100%;
            border: 2px solid #d4af37 !important;
            border-radius: 6px;
            padding: 0 10px;
            font-size: 16px; 
            outline: none !important;
            box-shadow: none !important;
            caret-color: #d4af37;
            -webkit-appearance: none;
            background-color: #ffffff;
            -webkit-user-select: text;
            user-select: text;
        }
        .input-box:-webkit-autofill {
            -webkit-box-shadow: 0 0 0px 1000px white inset !important;
            -webkit-text-fill-color: #333 !important;
        }

        .captcha-img-box {
            width: 94px;
            height: 100%;
            border: 1px solid #0000cd;
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: "Comic Sans MS", "Chalkboard SE", "Bradley Hand", cursive;
            color: #0000cd;
        }
        .hand-char { display: inline-block; }
        .c1 { transform: rotate(-15deg) translateY(2px); font-size: 20px; font-weight: bold; }
        .c2 { transform: rotate(10deg) translateY(-1px); font-size: 17px; }
        .c3 { transform: rotate(-8deg) translateY(3px); font-size: 22px; font-weight: bold; }
        .c4 { transform: rotate(18deg) translateY(-2px); font-size: 19px; }

        .btn-confirm {
            width: 248px;
            height: 40px;
            background-color: #557bf8;
            border: none;
            border-radius: 20px;
            color: #fff;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
        }
        .btn-confirm:active { background-color: #4a6ee0; }


        /* ================= 证书展示区 (物理级数学比例锁死) ================= */
        .cert-wrap {
            position: absolute;
            top: var(--header-total);
            bottom: 0; left: 0; right: 0;
            background-color: #e4f0f8;
            overflow: hidden; 
            touch-action: none; /* 绝杀手势放大 */
        }

        .img-container {
            /* 采用绝对定位：不依赖内部图片，强行画出一个指定大小的白框 */
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            
            /* 【数学锁定 1】：宽度比例 1:1（即 50%的宽度对分空间），全端统一 */
            width: 50%;
            
            /* 【数学锁定 2】：长度比例 0.4:1（即蓝色剩余高度的 40%），全端统一 */
            height: 40%; 
            
            /* 【数学锁定 3】：极限 3px 缝隙 */
            top: 3px; 
            
            background-color: #ffffff;
            border: 1px solid #dcdcdc;
            box-shadow: 0 2px 5px rgba(0,0,0,0.03);
            overflow: hidden;
            pointer-events: none; /* 防止点击放大 */
        }

        #cert-img {
            /* 图片适应白框 */
            width: 100%;
            height: 100%;
            /* 保证证书内容在这个固定比例的框内完整显示，绝不被裁切 */
            object-fit: contain; 
            display: block;
            opacity: 0;
        }

        #msg-box {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.85);
            color: #fff;
            padding: 14px 24px;
            border-radius: 8px;
            display: none;
            z-index: 10001;
            font-size: 16px;
            white-space: nowrap;
        }
    </style>
</head>
<body>

    <div id="msg-box"></div>

    <!-- Page 1: 验证页 -->
    <div id="page-verify" class="page active">
        <!-- 绝对唯一顶部导航 -->
        <div class="custom-header">
            <span class="header-icon-close" onclick="location.reload()">&times;</span>
            <div class="header-center">
                <div class="header-title">国家职业资格证书管理系统</div>
                <div class="header-domain">zxnl.ceht.net</div>
            </div>
            <span class="header-icon-more">···</span>
        </div>
        
        <div class="verify-wrap">
            <div class="h1-title">请输入验证码</div>
            <div class="captcha-area">
                <input type="text" id="captcha-input" class="input-box" placeholder="验证码" maxlength="4" autocomplete="off" spellcheck="false" inputmode="text">
                <div class="captcha-img-box">
                    <span class="hand-char c1">e</span>
                    <span class="hand-char c2">e</span>
                    <span class="hand-char c3">q</span>
                    <span class="hand-char c4">c</span>
                </div>
            </div>
            <button id="btn-submit" class="btn-confirm">确认</button>
        </div>
    </div>

    <!-- Page 2: 证书页 -->
    <div id="page-result" class="page">
        <!-- 绝对唯一顶部导航 -->
        <div class="custom-header">
            <span class="header-icon-close" id="btn-back">&times;</span>
            <div class="header-center">
                <div class="header-title">证书信息</div>
                <div class="header-domain">xf.kaoxue.com</div>
            </div>
            <span class="header-icon-more">···</span>
        </div>
        
        <div class="cert-wrap">
            <!-- 绝对比例相框：50%宽，40%高，顶距4px -->
            <div class="img-container">
                <img id="cert-img" src="" alt="">
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // 兜底防御：强行置空浏览器原生标题，杜绝双层文字
            document.title = '\u200B'; 

            const btnSubmit = document.getElementById('btn-submit');
            const input = document.getElementById('captcha-input');
            const pageVerify = document.getElementById('page-verify');
            const pageResult = document.getElementById('page-result');
            const certImg = document.getElementById('cert-img');
            const msgBox = document.getElementById('msg-box');
            
            let timer = null;

            function showMsg(txt) {
                msgBox.innerText = txt;
                msgBox.style.display = 'block';
                if(timer) clearTimeout(timer);
                timer = setTimeout(() => { msgBox.style.display = 'none'; }, 2000);
            }

            function processVerification() {
                const val = input.value.trim().toLowerCase();
                if (val === 'eeqc') {
                    // 1. 瞬变底色
                    document.body.style.backgroundColor = '#e4f0f8';
                    
                    // 2. 瞬间切换
                    pageVerify.classList.remove('active');
                    pageResult.classList.add('active');
                    
                    // 3. 开始加载图片
                    certImg.style.opacity = '0';
                    const cacheBuster = new Date().getTime(); 
                    
                    // 照片导入 100% 防御机制，包含隐藏后缀的 jpg.jpg
                    const imagesToTry = [
                        'certificate.jpg.jpg', 
                        'certificate.jpg', 
                        'cert_image.jpg', 
                        'certificate.png'
                    ];
                    let currentIdx = 0;

                    certImg.onload = function() { 
                        this.style.opacity = '1'; 
                    };

                    certImg.onerror = function() {
                        currentIdx++;
                        if (currentIdx < imagesToTry.length) {
                            this.src = imagesToTry[currentIdx] + '?t=' + cacheBuster;
                        } else {
                            this.onerror = null;
                        }
                    };

                    certImg.src = imagesToTry[0] + '?t=' + cacheBuster;
                    
                    input.blur();
                } else {
                    showMsg('验证码输入错误');
                }
            }

            btnSubmit.onclick = processVerification;
            
            input.onkeydown = (e) => { 
                if (e.key === 'Enter' || e.keyCode === 13) {
                    e.preventDefault(); 
                    processVerification();
                }
            };

            // 返回按钮
            document.getElementById('btn-back').onclick = () => {
                document.body.style.backgroundColor = '#ffffff';
                pageResult.classList.remove('active');
                pageVerify.classList.add('active');
                input.value = '';
                certImg.src = '';
                certImg.style.opacity = '0';
            };

            // 修复 iOS 键盘弹起 Bug
            input.onblur = () => {
                setTimeout(() => { 
                    window.scrollTo(0, 0); 
                    document.body.scrollTop = 0;
                }, 100);
            };
        });
    </script>
</body>
</html>
